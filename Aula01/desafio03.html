<body>

    <h1>Integrando os recursos de interatividade do JS</h1>

    <hr>

    <h2></h2>
    <script>

        window.alert("Seja bem vindo!");
        let n1 = parseInt(window.prompt("Digite seu 1º númeto? "));
        let n2 = parseInt(window.prompt("Digite seu 2º númeto? "));
        let resultado = 0

        let operacao = window.prompt("Sua conta vai ser de mais(+) ou menos(-)? ")

        if (operacao == "+") {
            resultado = n1 + n2;
        } else {
            resultado = n1 - n2;
        }

        document.getElementsByTagName("h2")[0].innerText = resultado

    </script>
