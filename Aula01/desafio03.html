<body>
    <h1>DESAFIO 03</h1>
    <hr>
    <p></p>
 
    <script>
        window.alert("realizador de contas");

        let num1 = parseInt(window.prompt("informe o primeiro numero? "));
        let num2 = parseInt(window.prompt("informe o segundo numero?"))
        
        //window.alert(num1,num2); 
        //console.log(num1,num2);
        let resultado = 0

        let opr = window.prompt("Qual operação sinal de (+) para soma sinal de (-) para subtração (*) para multiplicação (/) para divisão  ?")
        if (opr == "+"){
            resultado =  num1 + num2 

        }else if (opr == "-"){
           resultado = num1 - num2
        }else if (opr == "*" ){
            resultado = num1 * num2
        }else{

            if (num2 == 0 ){
                resultado="Não foi possivel realizar essa conta!"
            }else{
                resultado = num1 / num2
            }
        }


    
        document.getElementsByTagName('p')[0].innerText= 'O resultado da operação e = '+resultado
        

    </script>
