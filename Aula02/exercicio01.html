<body>

    <h1>MANIPULANDO ELEMNETOS (TAG) DO HTML ATRAVÉS DO JS</h1>
    <hr>
    <div>
        <p>ESTAMOS APRENDENDO JAVASCRIPT</p>
        <hr>
        <p>Aprender é muito legal</p>
        <p>E para ajudar o aprendizado, é preciso praticar e exercitar</p>
    </div>
    <script>
        const tags_P = document.getElementsByTagName("p")
        console.log(tags_P)
        let tags_P_1 = tags_P[0]
        console.log(tags_P_1)
        tags_P_1.style.backgroundColor="purple";
        tags_P_1.style.color="white";
        tags_P_1.style.textAlign="center";
        tags_P_1.style.fontSize="25pt"

        let tags_P2_1 = tags_P[1]
        console.log(tags_P2_1)
        tags_P2_1.style.backgroundColor="black";
        tags_P2_1.style.color="white";
        tags_P2_1.style.textAlign="center";
        tags_P2_1.style.fontSize="20pt"

        let tags_P3_1 = tags_P[2]
        console.log(tags_P3_1)
        tags_P3_1.style.backgroundColor="gray";
        tags_P3_1.style.color="white";
        tags_P3_1.style.textAlign="center";
        tags_P3_1.style.fontSize="20pt"

        tags_P3_1.innerText = "ATURMA DO DEV É MUITO LEGAL!"

        document.write('<h2>UAAU, JAVASCRIPT É MUITO LEGAL!')

    </script>

</body>
